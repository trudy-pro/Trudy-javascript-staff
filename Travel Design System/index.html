
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Component Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Button Component System</h1>
        
        <section>
            <h3>1. Variants</h3>
            <div class="row">
                <button class="btn btn-primary">Primary Action</button>
                <button class="btn btn-secondary">Secondary</button>
                <button class="btn btn-tertiary">Tertiary</button>
                <button class="btn btn-danger">Delete/Danger</button>
            </div>
        </section>

        <section>
            <h3>2. States</h3>
            <div class="row">
                <button class="btn btn-primary">Normal</button>
                <button class="btn btn-primary btn-hover-mock">Hover State</button>
                <button class="btn btn-primary" disabled>Disabled</button>
            </div>
        </section>

        <section>
            <h3>3. Sizes</h3>
            <div class="row">
                <button class="btn btn-primary btn-sm">Small</button>
                <button class="btn btn-primary btn-md">Medium (Default)</button>
                <button class="btn btn-primary btn-lg">Large</button>
            </div>
        </section>
    </div>

</body>
</html>
